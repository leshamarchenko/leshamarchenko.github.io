  <body>
    <main class="index-shell" aria-label="Alexey Marchenko portfolio">
      <header class="topline">
        <span class="logo">A.M.</span>

      <section class="identity">
        <h1>ALEXEY MARCHENKO</h1>

      <section class="work-index" aria-label="Selected works">
        <article class="project-card is-open">
          <button class="project-row" type="button" aria-expanded="true" aria-controls="project-yapay">
            <span>YANDEX PAY</span><span>AI COMMERCIAL</span>
          </button>
          <div class="project-panel" id="project-yapay">
            <div class="project-panel-inner">
              <button
                class="project-media"
                type="button"
                aria-label="Play Yandex Pay video"
                data-video="./assets/videos/yapay.mp4"
                data-title="YANDEX PAY"
                data-type="AI COMMERCIAL"
                data-description="AI visualisation and animation for Yandex Pay. The project developed the character, locations and scenes around a body-mounted camera perspective."
              >
                <picture>
                  <source
                    type="image/webp"
                    srcset="./assets/posters/optimized/yapay-640.webp 640w, ./assets/posters/optimized/yapay-1280.webp 1280w"
                    sizes="(min-width: 700px) 560px, 100vw"
                  />
                  <img
                    src="./assets/posters/optimized/yapay-1280.jpg"
                    alt="Yandex Pay project still"
                    width="1280"
                    height="720"
                    loading="eager"
                    decoding="async"
                    fetchpriority="high"
                  />
                </picture>
              </button>
            </div>
          </div>
        </article>

    <div
      class="video-modal"
      id="videoModal"
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
      aria-describedby="modalDescription modalStatus"
      inert
    >
      <button class="modal-close" type="button" aria-label="Close video">CLOSE</button>
      <div class="video-modal-content">
        <video controls playsinline webkit-playsinline preload="metadata"></video>
        <div class="video-details">
          <p id="modalType"></p>
          <h2 id="modalTitle"></h2>
          <p id="modalDescription"></p>
          <p class="video-status" id="modalStatus" aria-live="assertive" hidden></p>
        </div>
      </div>
    </div>
