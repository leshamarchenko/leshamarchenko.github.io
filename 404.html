<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <title>Page not found — Alexey Marchenko</title>
    <style>
      @font-face { font-family: "Azeret Mono"; src: url("./assets/fonts/AzeretMono-Regular.ttf") format("truetype"); font-display: swap; }
      :root { --paper: #fff; --ink: #151615; --line: #c7c6bf; }
      * { box-sizing: border-box; }
      html { background: var(--paper); }
      body { min-width: 320px; min-height: 100vh; display: grid; margin: 0; padding: 16px; place-items: center; background: var(--paper); color: var(--ink); font-family: "Azeret Mono", monospace; }
      main { width: min(100%, 560px); padding: 24px; border: 1px solid var(--line); }
      p { margin: 0 0 28px; font-size: 9px; line-height: 1.5; }
      a { display: grid; min-height: 48px; place-items: center; border: 1px solid var(--ink); color: inherit; font-size: 9px; text-decoration: none; }
      @media (hover: hover) { a:hover { background: var(--ink); color: var(--paper); } }
    </style>
  </head>
  <body>
    <main>
      <p>PAGE NOT FOUND</p>
      <a href="./">RETURN TO PORTFOLIO</a>
    </main>
  </body>
</html>
